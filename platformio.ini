; PlatformIO project configuration for the WiPhone firmware.
;
; Reconstructed from WiPhone's custom Arduino board package (WiPhone0.1.2), which
; is stock arduino-esp32 1.0.5-rc7 plus a 16 MB partition table and a PSRAM-enabled
; board entry. All hardware pins are defined in the firmware itself (Hardware.h and
; src/TFT_eSPI/User_Setup.h), so no custom pin variant is required here.
;
; espressif32 @ 3.1.x ships arduino-esp32 1.0.5, matching the upstream core version.

[platformio]
src_dir = WiPhone
; WiPhone's SPIFFS filesystem image (configs, ringtones, fonts) lives in the
; sketch subfolder rather than PlatformIO's default data/ directory.
data_dir = WiPhone/data

[env:wiphone]
platform = espressif32@3.5.0
framework = arduino
board = wiphone

; Firmware lives in the WiPhone/ sketch folder rather than the default src/.
; RadioHead (WiPhone's patched copy) is vendored under lib/.

board_build.partitions = partitions/default_16MB.csv
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.f_cpu = 240000000L

; SPI-RAM (PSRAM) cache workaround required by the WROVER module on this core.
; -Wno-error matches WiPhone's Arduino build, which used the default (empty) warning
; level; PlatformIO otherwise injects -Werror=reorder/-Werror=return-type and fails.
; (-mfix-esp32-psram-cache-issue removed: this phone's chip is ESP32-D0WDQ6-V3,
; revision 3 per esptool, which doesn't have the rev-1 PSRAM cache bug. The
; workaround pessimizes all generated code — the emulator can't afford it.)
build_flags =
    -Wno-error

; Strip the -Werror flags PlatformIO injects for the Arduino framework; WiPhone's
; build left them as plain warnings (empty default warning level).
build_unflags =
    -Werror=reorder
    -Werror=return-type
    -Werror=all

monitor_speed = 115200
upload_speed = 921600
